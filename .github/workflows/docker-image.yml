name: CI/CD Pipeline with Custom Docker Registry

on:
  push:
    branches:
      - main  # Trigger on push to the main branch
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Custom Docker Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login dr.bobosoftware.co.za -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Set branch tag
        if: startsWith(github.ref, 'refs/heads/')
        run: echo "BRANCH_TAG=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Verify Infisical token secret
        env:
          RESOLVED_TOKEN: ${{ secrets.INFISICAL_TOKEN || secrets.VITE_SKAFTIN_ACCESS_TOKEN }}
        run: |
          if [ -z "$RESOLVED_TOKEN" ]; then
            echo "::error::Missing required secret. Set INFISICAL_TOKEN (preferred) or VITE_SKAFTIN_ACCESS_TOKEN."
            exit 1
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          INFISICAL_TOKEN_RESOLVED: ${{ secrets.INFISICAL_TOKEN || secrets.VITE_SKAFTIN_ACCESS_TOKEN }}
        with:
          context: .
          push: true
          build-args: |
            INFISICAL_ENV=prod
            INFISICAL_DOMAIN=https://app.infisical.com
          secrets: |
            infisical_token=${{ env.INFISICAL_TOKEN_RESOLVED }}
          tags: |
            dr.bobosoftware.co.za/foro:latest
            dr.bobosoftware.co.za/foro:${{ env.VERSION != '' && env.VERSION || env.BRANCH_TAG }}
